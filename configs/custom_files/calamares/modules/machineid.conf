---
# Universal machine-id generator config for Gentoo-Builder init systems (OpenRC, Systemd, Runit, S6)

# Try systemd-machine-id-setup first if systemd is present
system: true

# Fallback to dbus-uuidgen if systemd is not present (OpenRC, Runit, S6)
dbus: true

# Keep /etc/machine-id as a real file for universal compatibility
symlink: false

# Create /var/lib/dbus/machine-id as a symlink pointing to /etc/machine-id
dbus-symlink: true
