# SPDX-License-Identifier: CC0-1.0
# Configure Gentoo post-install environment (locale-gen, environment updates, machine-id fallback)
dontChroot: false
timeout: 600
script:
    - command: "env-update"
    - command: "locale-gen"
    - command: "sh -c 'if [ ! -s /etc/machine-id ]; then if command -v systemd-machine-id-setup >/dev/null 2>&1; then systemd-machine-id-setup; elif command -v dbus-uuidgen >/dev/null 2>&1; then dbus-uuidgen --ensure=/etc/machine-id; fi; fi'"
    - command: "sh -c 'mkdir -p /var/lib/dbus && ln -sf /etc/machine-id /var/lib/dbus/machine-id'"
